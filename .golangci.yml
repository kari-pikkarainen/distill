version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck        # unhandled errors
    - govet           # suspicious constructs (printf format, etc.)
    - staticcheck     # broad set of static analysis checks
    - unused          # unused code

    # Security
    - gosec           # security-focused static analysis

    # Common bugs
    - copyloopvar     # loop variable capture bugs (pre-Go 1.22 semantics)
    - nilnil          # functions returning (nil, nil) are almost always wrong
    - noctx           # HTTP requests without context
    - bodyclose       # unclosed HTTP response bodies

    # Style / documentation
    - misspell        # spelling mistakes in comments, strings, and identifiers
    - nolintlint      # enforces proper nolint directive formatting
    - revive          # opinionated but configurable Go style checker

    # Test quality
    - testifylint     # correct use of testify assertion functions

  settings:
    gosec:
      # G104: errors unhandled — already covered by errcheck
      excludes:
        - G104
      config:
        # Require at least 0600 on created files
        G306: "0600"

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - checkPrivateReceivers
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: unused-parameter

    testifylint:
      enable-all: true

  exclusions:
    rules:
      # Test files may shadow package-level variables.
      - linters: [govet]
        path: "_test\\.go"
        text: "shadow"
      # Security rules are relaxed in tests.
      - linters: [gosec]
        path: "_test\\.go"
      # Builder functions invoke fixed external binaries (grype, syft, cosign, podman, docker).
      # G204 (subprocess with variable args) is a false positive for these controlled invocations.
      - linters: [gosec]
        path: "internal/builder"
        text: "G204"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/damnhandy/distill
