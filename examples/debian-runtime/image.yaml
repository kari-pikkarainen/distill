# Minimal Debian Bookworm runtime image.
#
# Demonstrates that Distill works against APT-based distributions
# using the same spec format as the RHEL9 example.

name: debian-runtime
description: Minimal Debian Bookworm base runtime with no package manager

base:
  image: debian:bookworm-slim
  releasever: bookworm
  packageManager: apt

packages:
  - libc6
  - libstdc++6
  - ca-certificates
  - tzdata

accounts:
  groups:
    - name: appuser
      gid: 10001
  users:
    - name: appuser
      uid: 10001
      gid: 10001
      shell: /usr/sbin/nologin

image:
  cmd: ["/bin/sh"]
  env:
    LANG: en_US.UTF-8
    LC_ALL: en_US.UTF-8

immutable: true
