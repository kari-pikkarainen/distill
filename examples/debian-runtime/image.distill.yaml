# Minimal Debian Bookworm runtime image.
#
# Demonstrates that distill works against APT-based distributions
# using the same spec format as the RHEL9 example.

name: debian-runtime
description: Minimal Debian Bookworm base runtime with no package manager

# variant: "runtime" removes the package manager after installation (default).
# Use "dev" to retain it for development images.
variant: runtime

# tags are the OCI image references applied to the built image.
tags:
  - distill-example-debian-runtime:latest

# platforms lists the target build platforms.
platforms:
  - linux/amd64
  - linux/arm64

base:
  image: debian:bookworm-slim
  releasever: bookworm

contents:
  packages:
    - libc6
    - libstdc++6
    - ca-certificates
    - tzdata

accounts:
  run-as: appuser
  users:
    - name: appuser
      uid: 10001
      gid: 10001
      shell: /usr/sbin/nologin
  groups:
    - name: appuser
      gid: 10001

environment:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

cmd:
  - /bin/sh
