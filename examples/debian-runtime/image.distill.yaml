# Minimal Debian Bookworm runtime image.
#
# Demonstrates that distill works against APT-based distributions
# using the same spec format as the RHEL9 example.

name: debian-runtime
description: Minimal Debian Bookworm base runtime with no package manager

# variant: "runtime" removes the package manager after installation (default).
# Use "dev" to retain it for development images.
variant: runtime

# platforms lists the target build platforms.
platforms:
  - linux/amd64
  - linux/arm64

# source is the distribution image used for the chroot bootstrap.
source:
  image: debian:bookworm-slim
  releasever: bookworm

# destination is the OCI image reference applied to the built image.
destination:
  image: ghcr.io/damnhandy/debian-distilled
  releasever: latest

contents:
  packages:
    - libc6
    - libstdc++6
    - ca-certificates
    - tzdata

accounts:
  run-as: appuser
  users:
    - name: appuser
      uid: 10001
      gid: 10001
      shell: /usr/sbin/nologin
  groups:
    - name: appuser
      gid: 10001

environment:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

cmd:
  - /bin/sh
