# Minimal CentOS Stream 9 runtime image.
#
# Target: ≤30MB compressed
#
# Demonstrates distill against CentOS Stream 9, an upstream contributor
# distribution for RHEL that shares the same DNF-based package ecosystem.
#
# The package manager (dnf/rpm) is removed after installation.

name: centos-stream9-runtime
description: Minimal CentOS Stream 9 base runtime with no package manager

variant: runtime

platforms:
  - linux/amd64
  - linux/arm64

source:
  image: quay.io/centos/centos:stream9
  releasever: "9"

destination:
  image: ghcr.io/damnhandy/centos-stream9-distilled
  releasever: latest

contents:
  packages:
    - coreutils
    - glibc
    - libstdc++
    - ca-certificates
    - tzdata
    - glibc-langpack-en

accounts:
  run-as: appuser
  users:
    - name: appuser
      uid: 10001
      gid: 10001
      shell: /sbin/nologin
  groups:
    - name: appuser
      gid: 10001

environment:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

cmd:
  - /bin/bash

pipeline:
  scan:
    enabled: true
    fail-on: critical
  sbom:
    enabled: true
  provenance:
    enabled: true
