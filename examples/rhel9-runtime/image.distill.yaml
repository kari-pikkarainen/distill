# Minimal RHEL9 runtime image — the base layer for all other RHEL9-derived images.
#
# Target: ≤30MB compressed
#
# Contains only what is required to run a dynamically linked executable:
#   - glibc and libstdc++ for runtime linking
#   - coreutils for basic shell utilities (used by entrypoint scripts)
#   - ca-certificates for TLS verification
#   - tzdata for timezone support
#
# The package manager (dnf/rpm) is removed after installation.
# Images that extend this one should layer their runtime on top via
# a multi-stage build or a separate distill spec.

name: rhel9-runtime
description: Minimal RHEL9 base runtime with no package manager

# variant: "runtime" removes the package manager after installation (default).
# Use "dev" to retain it for development images.
variant: runtime

# platforms lists the target build platforms.
platforms:
  - linux/amd64
  - linux/arm64

# source is the distribution image used for the chroot bootstrap.
source:
  image: docker.io/redhat/ubi9
  releasever: "9"

# destination is the OCI image reference applied to the built image.
destination:
  image: ghcr.io/damnhandy/rhel9-distilled
  releasever: latest

contents:
  packages:
    - coreutils
    - glibc
    - libstdc++
    - ca-certificates
    - tzdata
    - glibc-langpack-en

accounts:
  run-as: appuser
  users:
    - name: appuser
      uid: 10001
      gid: 10001
      shell: /sbin/nologin
  groups:
    - name: appuser
      gid: 10001

environment:
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

cmd:
  - /bin/bash
