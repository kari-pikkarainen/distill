services:
  # ── distill-local-registry ────────────────────────────────────────────────
  # The Wave 0 OCI registry. distill-built images are pushed here.
  registry:
    image: registry:3
    container_name: distill-local-registry
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
      REGISTRY_VALIDATION_DISABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/v2/"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

  # ── docker-hub-cache (opt-in via --profile cache) ─────────────────────────
  # Pull-through cache for Docker Hub. When enabled, configure your local
  # Docker daemon to use http://localhost:5001 as a registry mirror — then
  # `docker pull ubuntu:24.04` goes through the cache transparently. First
  # pull hits Docker Hub; every subsequent pull is local.
  #
  # Enable with:
  #   docker compose --profile cache up -d
  #
  # Set DOCKERHUB_USER and DOCKERHUB_TOKEN in your environment for higher
  # rate limits (authenticated pulls get 200/6h vs. 100/6h anonymous).
  docker-hub-cache:
    image: registry:3
    container_name: distill-dockerhub-cache
    profiles: [cache]
    ports:
      - "5001:5000"
    environment:
      REGISTRY_PROXY_REMOTEURL: "https://registry-1.docker.io"
      REGISTRY_PROXY_USERNAME: "${DOCKERHUB_USER:-}"
      REGISTRY_PROXY_PASSWORD: "${DOCKERHUB_TOKEN:-}"
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
    volumes:
      - dockerhub-cache-data:/var/lib/registry
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/v2/"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

  # ── redhat-cache (opt-in via --profile cache) ─────────────────────────────
  # Pull-through cache for Red Hat's public UBI registry. UBI9 base images
  # and UBI-derived variants come through here. Anonymous pulls are fine
  # for UBI (distinct from RHEL itself, which requires a subscription).
  redhat-cache:
    image: registry:3
    container_name: distill-redhat-cache
    profiles: [cache]
    ports:
      - "5002:5000"
    environment:
      REGISTRY_PROXY_REMOTEURL: "https://registry.access.redhat.com"
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
    volumes:
      - redhat-cache-data:/var/lib/registry
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/v2/"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  registry-data:
    name: distill-local-registry-data
  dockerhub-cache-data:
    name: distill-dockerhub-cache-data
  redhat-cache-data:
    name: distill-redhat-cache-data
