services:
  registry:
    image: registry:3
    container_name: distill-local-registry
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
      REGISTRY_VALIDATION_DISABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/v2/"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s

volumes:
  registry-data:
    name: distill-local-registry-data
